<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>System Feedback - Lecture System</title><style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #333399 0%, #4a4aaa 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; } .feedback-container { background: white; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-width: 500px; width: 100%; overflow: hidden; } .feedback-header { background: #333399; color: white; padding: 2rem; text-align: center; } .feedback-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; } .feedback-header p { opacity: 0.9; font-size: 0.9rem; } .feedback-form { padding: 2rem; } .form-group { margin-bottom: 1.5rem; } .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #333; } .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s; } .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #333399; } .form-group textarea { resize: vertical; min-height: 120px; } .rating-group { display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0; } .star { font-size: 2rem; color: #ddd; cursor: pointer; transition: color 0.2s; } .star:hover, .star.active { color: #FCB900; } .btn { background: #333399; color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; width: 100%; } .btn:hover { background: #2a2a7a; } .btn:disabled { background: #ccc; cursor: not-allowed; } .message { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; } .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; } .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; } .back-link { text-align: center; margin-top: 1rem; } .back-link a { color: #333399; text-decoration: none; font-weight: 600; } .back-link a:hover { text-decoration: underline; } @media (max-width: 600px) { .feedback-container { margin: 1rem; } .feedback-header, .feedback-form { padding: 1.5rem; } } </style></head><body><div class="feedback-container"><div class="feedback-header"><h1>📝 System Feedback</h1><p>Help us improve your lecture experience</p></div><div class="feedback-form"><div id="message"></div><form id="feedbackForm"><div class="form-group"><label for="name">Your Name *</label><input type="text" id="name" name="name" required></div><div class="form-group"><label for="email">Email Address *</label><input type="email" id="email" name="email" required></div><div class="form-group"><label for="role">Your Role *</label><select id="role" name="role" required><option value="">Select your role</option><option value="presenter">Presenter/Lecturer</option><option value="student">Student</option></select></div><div class="form-group"><label for="sessionId">Session (Optional)</label><input type="text" id="sessionId" name="sessionId" placeholder="Room ID if applicable"></div><div class="form-group"><label for="feedbackType">Feedback Type *</label><select id="feedbackType" name="feedbackType" required><option value="">Select feedback type</option><option value="bug_report">Bug Report</option><option value="feature_request">Feature Request</option><option value="general">General Feedback</option><option value="rating">System Rating</option></select></div><div class="form-group" id="ratingGroup" style="display: none;"><label>Rate Your Experience *</label><div class="rating-group"><span class="star" data-rating="1">⭐</span><span class="star" data-rating="2">⭐</span><span class="star" data-rating="3">⭐</span><span class="star" data-rating="4">⭐</span><span class="star" data-rating="5">⭐</span></div><input type="hidden" id="rating" name="rating" value="0"></div><div class="form-group"><label for="subject">Subject *</label><input type="text" id="subject" name="subject" required placeholder="Brief summary of your feedback"></div><div class="form-group"><label for="message">Your Feedback *</label><textarea id="message" name="message" required placeholder="Please provide detailed feedback..."></textarea></div><button type="submit" class="btn" id="submitBtn">Submit Feedback</button></form><div class="back-link"><a href="index.html">← Back to Lecture System</a></div></div></div><script> const API_BASE = 'http://localhost:3000'; let selectedRating = 0; // Rating system const stars = document.querySelectorAll('.star'); stars.forEach(star => { star.addEventListener('click', function() { selectedRating = parseInt(this.dataset.rating); document.getElementById('rating').value = selectedRating; updateStars(); }); star.addEventListener('mouseenter', function() { const hoverRating = parseInt(this.dataset.rating); stars.forEach((s, index) => { if (index < hoverRating) { s.classList.add('active'); } else { s.classList.remove('active'); } }); }); }); document.querySelector('.rating-group').addEventListener('mouseleave', updateStars); function updateStars() { stars.forEach((star, index) => { if (index < selectedRating) { star.classList.add('active'); } else { star.classList.remove('active'); } }); } // Show/hide rating based on feedback type document.getElementById('feedbackType').addEventListener('change', function() { const ratingGroup = document.getElementById('ratingGroup'); if (this.value === 'rating') { ratingGroup.style.display = 'block'; } else { ratingGroup.style.display = 'none'; selectedRating = 0; document.getElementById('rating').value = 0; updateStars(); } }); // Form submission document.getElementById('feedbackForm').addEventListener('submit', async function(e) { e.preventDefault(); const submitBtn = document.getElementById('submitBtn'); const messageDiv = document.getElementById('message'); // Validate rating if required const feedbackType = document.getElementById('feedbackType').value; if (feedbackType === 'rating' && selectedRating === 0) { messageDiv.innerHTML = '<div class="message error">Please select a rating</div>'; return; } // Disable submit button submitBtn.disabled = true; submitBtn.textContent = 'Submitting...'; const formData = { name: document.getElementById('name').value, email: document.getElementById('email').value, role: document.getElementById('role').value, sessionId: document.getElementById('sessionId').value || null, feedbackType: feedbackType, rating: feedbackType === 'rating' ? selectedRating : null, subject: document.getElementById('subject').value, message: document.getElementById('message').value }; try { const response = await fetch(`${API_BASE}/api/feedback`, { method: 'POST', headers: { 'Content-Type': 'application/json', }, body: JSON.stringify(formData) }); const result = await response.json(); if (response.ok) { messageDiv.innerHTML = '<div class="message success">Thank you! Your feedback has been submitted successfully.</div>'; document.getElementById('feedbackForm').reset(); selectedRating = 0; updateStars(); } else { messageDiv.innerHTML = `<div class="message error">Error: ${result.error || 'Failed to submit feedback'}</div>`; } } catch (error) { console.error('Error submitting feedback:', error); messageDiv.innerHTML = '<div class="message error">Failed to connect to server. Please try again later.</div>'; } finally { submitBtn.disabled = false; submitBtn.textContent = 'Submit Feedback'; } }); // Get session ID from URL if provided const urlParams = new URLSearchParams(window.location.search); const sessionId = urlParams.get('session'); if (sessionId) { document.getElementById('sessionId').value = sessionId; } </script></body></html>
